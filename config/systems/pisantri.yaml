# Genesis QA - PISANTRI API Configuration
# =========================================
# Live configuration for api.pondokinformatika.id

system:
  name: "PISANTRI API"
  type: "api"
  base_url: "https://api.pondokinformatika.id"

auth:
  login_endpoint: "/api/auth/login"
  credentials:
    admin:
      username: "admin@admin.com"
      password: "superadmin"
    user:
      username: "user@pisantri.com"
      password: "${PISANTRI_USER_PASSWORD}"

endpoints:
  landing_data:
    path: "/public/landing-data"
    method: "GET"
    expected_status: [200]
    note: "should redirect 302 → 200"
  landing_data_direct:
    path: "/api/public/landing-data"
    method: "GET"
    expected_status: [200]
  login_api:
    path: "/api/auth/login"
    method: "POST"
    expected_status: [200]
    auth_required: true
  login_frontend:
    path: "/auth/login"
    method: "POST"
    expected_status: [200]
    note: "should redirect 307 → 200"
  landing_page:
    path: "/"
    method: "GET"
    expected_status: [200]
  login_page:
    path: "/login"
    method: "GET"
    expected_status: [200]

security:
  test_cors: true
  test_headers: true
  test_redirects: true
  test_disclosure: true
  test_directory_listing: true

cors:
  allowed_origins:
    - "https://pondokinformatika.id"
    - "https://www.pondokinformatika.id"
    - "https://pesantrenteknologi.id"

# Database configuration (optional — only used if driver is available)
performance:
  enabled: true
  response_time_threshold_ms: 2000
  concurrent_requests: 10
  stress_requests: 20
  endurance_duration_sec: 15
  tests:
    - name: "Landing page response time"
      type: response_time
      endpoint: /api/public/landing-data
      method: GET
      threshold_ms: 2000
    - name: "Concurrent landing page"
      type: concurrent
      endpoint: /api/public/landing-data
      method: GET
      concurrency: 5
      requests: 10
    - name: "Stress test landing page"
      type: stress
      endpoint: /api/public/landing-data
      method: GET
      requests: 20
      ramp_up: 3
