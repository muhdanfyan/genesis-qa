# Genesis QA - Pondok Informatika Website Configuration
# ======================================================
# Configuration for testing pondokinformatika.id landing page.
# Single-page app (SPA) — no CORS needed.
#
# Endpoints:
#   GET / → 200 (landing page)
#   GET /login → 200 (login page)
#   GET /favicon.ico → 200 (favicon)
#
# Security: test headers, disclosure, redirects
# No CORS test for SPA.

system:
  name: "Pondok Informatika Website"
  type: "single-page-app"
  base_url: "https://pondokinformatika.id"

endpoints:
  landing_page:
    path: "/"
    method: "GET"
    expected_status: [200]
  login_page:
    path: "/login"
    method: "GET"
    expected_status: [200]
  favicon:
    path: "/favicon.ico"
    method: "GET"
    expected_status: [200]

security:
  test_cors: false       # Not needed for SPA
  test_headers: true
  test_redirects: true
  test_disclosure: true
  test_directory_listing: false

cors:
  allowed_origins: []

database:
  enabled: false
